name: Partner Overlap Report

on:
  schedule:
    - cron: '0 12 * * 1'   # Every Monday at 12:00 UTC (8:00 AM ET)
  workflow_dispatch:         # Allow manual trigger from GitHub UI

jobs:
  overlap-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout pipeline repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate overlap report
        env:
          GH_PAT:        ${{ secrets.GH_PAT }}
          PS_PUBLIC_KEY: ${{ secrets.PS_PUBLIC_KEY }}
          PS_SECRET_KEY: ${{ secrets.PS_SECRET_KEY }}
          CLOSE_API_KEY: ${{ secrets.CLOSE_API_KEY }}
        run: python overlap_report.py

      - name: Log completion
        run: echo "Overlap report generated at $(date -u)"
